<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 200" font-family="'Noto Sans CJK KR', 'Noto Sans', sans-serif">
  <defs><filter id="s"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/></filter></defs>

  <text x="375" y="25" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">RMSNorm 처리 흐름 (각 행 단위)</text>

  <!-- Input -->
  <rect x="20" y="55" width="90" height="45" rx="8" fill="#3498db" filter="url(#s)"/><text x="65" y="77" text-anchor="middle" font-size="12" fill="white" font-weight="bold">x[i, :]</text><text x="65" y="92" text-anchor="middle" font-size="9" fill="#d6eaf8">입력 행</text>

  <text x="125" y="82" text-anchor="middle" font-size="16" fill="#888">→</text>

  <!-- Step 1 -->
  <rect x="140" y="55" width="100" height="45" rx="8" fill="#e67e22" filter="url(#s)"/><text x="190" y="75" text-anchor="middle" font-size="11" fill="white" font-weight="bold">x² 합산</text><text x="190" y="92" text-anchor="middle" font-size="9" fill="#fdebd0">tl.sum(x*x)</text>

  <text x="255" y="82" text-anchor="middle" font-size="16" fill="#888">→</text>

  <!-- Step 2 -->
  <rect x="270" y="55" width="100" height="45" rx="8" fill="#8e44ad" filter="url(#s)"/><text x="320" y="75" text-anchor="middle" font-size="11" fill="white" font-weight="bold">RMS 계산</text><text x="320" y="92" text-anchor="middle" font-size="9" fill="#e8daef">sqrt(mean+ε)</text>

  <text x="385" y="82" text-anchor="middle" font-size="16" fill="#888">→</text>

  <!-- Step 3 -->
  <rect x="400" y="55" width="100" height="45" rx="8" fill="#27ae60" filter="url(#s)"/><text x="450" y="75" text-anchor="middle" font-size="11" fill="white" font-weight="bold">정규화</text><text x="450" y="92" text-anchor="middle" font-size="9" fill="#d5f5e3">x / RMS</text>

  <text x="515" y="82" text-anchor="middle" font-size="16" fill="#888">→</text>

  <!-- Step 4 -->
  <rect x="530" y="55" width="100" height="45" rx="8" fill="#f1c40f" filter="url(#s)"/><text x="580" y="75" text-anchor="middle" font-size="11" fill="white" font-weight="bold">× γ</text><text x="580" y="92" text-anchor="middle" font-size="9" fill="#fef9e7">스케일링</text>

  <text x="645" y="82" text-anchor="middle" font-size="16" fill="#888">→</text>

  <!-- Output -->
  <rect x="660" y="55" width="75" height="45" rx="8" fill="#2ecc71" filter="url(#s)"/><text x="697" y="77" text-anchor="middle" font-size="12" fill="white" font-weight="bold">y[i, :]</text><text x="697" y="92" text-anchor="middle" font-size="9" fill="#d5f5e3">출력 행</text>

  <!-- Note -->
  <rect x="140" y="120" width="490" height="35" rx="6" fill="#fef9e7" stroke="#f7dc6f" stroke-width="1"/>
  <text x="385" y="142" text-anchor="middle" font-size="12" fill="#7d6608">전부 SRAM에서 처리 (1번 읽기 → 연산 → 1번 쓰기) = 커널 퓨전!</text>

  <text x="375" y="185" text-anchor="middle" font-size="12" fill="#7f8c8d">γ(gamma)는 학습 가능한 가중치 — 별도 포인터로 로드</text>
</svg>
