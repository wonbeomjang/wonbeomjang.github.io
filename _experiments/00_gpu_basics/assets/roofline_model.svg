<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'Noto Sans CJK KR', 'Noto Sans', sans-serif">
  <defs>
    <filter id="ds2">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>

  <text x="400" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">Roofline Model (RTX 4080)</text>

  <!-- Axes -->
  <line x1="100" y1="400" x2="750" y2="400" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="100" y1="400" x2="100" y2="55" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Y axis label -->
  <text x="55" y="230" text-anchor="middle" font-size="13" fill="#555" transform="rotate(-90, 55, 230)">성능 (GFLOPS)</text>

  <!-- X axis label -->
  <text x="425" y="440" text-anchor="middle" font-size="13" fill="#555">연산 강도 (Arithmetic Intensity, FLOP/Byte)</text>

  <!-- Y axis ticks -->
  <text x="90" y="365" text-anchor="end" font-size="10" fill="#888">100</text>
  <line x1="95" y1="360" x2="105" y2="360" stroke="#888" stroke-width="1"/>
  <text x="90" y="305" text-anchor="end" font-size="10" fill="#888">1K</text>
  <line x1="95" y1="300" x2="105" y2="300" stroke="#888" stroke-width="1"/>
  <text x="90" y="245" text-anchor="end" font-size="10" fill="#888">10K</text>
  <line x1="95" y1="240" x2="105" y2="240" stroke="#888" stroke-width="1"/>
  <text x="90" y="185" text-anchor="end" font-size="10" fill="#888">48.7K</text>
  <line x1="95" y1="180" x2="750" y2="180" stroke="#ddd" stroke-width="1" stroke-dasharray="4"/>

  <!-- X axis ticks -->
  <text x="180" y="418" text-anchor="middle" font-size="10" fill="#888">0.25</text>
  <text x="280" y="418" text-anchor="middle" font-size="10" fill="#888">3</text>
  <text x="340" y="418" text-anchor="middle" font-size="10" fill="#888">5</text>
  <text x="470" y="418" text-anchor="middle" font-size="10" fill="#888">68</text>
  <text x="600" y="418" text-anchor="middle" font-size="10" fill="#888">341</text>
  <text x="700" y="418" text-anchor="middle" font-size="10" fill="#888">1365</text>

  <!-- Memory bandwidth roof (diagonal line) -->
  <line x1="100" y1="390" x2="470" y2="180" stroke="#e74c3c" stroke-width="3"/>
  <text x="250" y="265" text-anchor="middle" font-size="12" fill="#e74c3c" font-weight="bold" transform="rotate(-33, 250, 265)">메모리 대역폭 한계</text>
  <text x="250" y="282" text-anchor="middle" font-size="10" fill="#c0392b" transform="rotate(-33, 250, 282)">717 GB/s x AI</text>

  <!-- Compute roof (horizontal line) -->
  <line x1="470" y1="180" x2="750" y2="180" stroke="#3498db" stroke-width="3"/>
  <text x="620" y="170" text-anchor="middle" font-size="12" fill="#3498db" font-weight="bold">연산 한계 48.7 TFLOPS</text>

  <!-- Ridge point -->
  <circle cx="470" cy="180" r="6" fill="#e67e22" stroke="white" stroke-width="2"/>
  <text x="470" y="155" text-anchor="middle" font-size="11" fill="#e67e22" font-weight="bold">균형점</text>
  <text x="470" y="145" text-anchor="middle" font-size="10" fill="#d35400">AI = 68</text>

  <!-- Ridge point vertical line -->
  <line x1="470" y1="180" x2="470" y2="400" stroke="#e67e22" stroke-width="1" stroke-dasharray="4"/>

  <!-- Kernel positions -->
  <!-- Vector Add -->
  <circle cx="180" cy="375" r="8" fill="#e74c3c" filter="url(#ds2)"/>
  <text x="195" y="372" font-size="11" fill="#c0392b" font-weight="bold">Vector Add</text>

  <!-- RMSNorm -->
  <circle cx="280" cy="330" r="8" fill="#e74c3c" filter="url(#ds2)"/>
  <text x="295" y="327" font-size="11" fill="#c0392b" font-weight="bold">RMSNorm</text>

  <!-- Softmax -->
  <circle cx="340" cy="305" r="8" fill="#e74c3c" filter="url(#ds2)"/>
  <text x="355" y="302" font-size="11" fill="#c0392b" font-weight="bold">Softmax</text>

  <!-- Flash Attention -->
  <circle cx="510" cy="195" r="8" fill="#8e44ad" filter="url(#ds2)"/>
  <text x="525" y="200" font-size="11" fill="#6c3483" font-weight="bold">Flash Attention</text>

  <!-- MatMul 1024 -->
  <circle cx="600" cy="190" r="8" fill="#3498db" filter="url(#ds2)"/>
  <text x="615" y="205" font-size="11" fill="#2471a3" font-weight="bold">MatMul 1024</text>

  <!-- MatMul 4096 -->
  <circle cx="700" cy="185" r="8" fill="#3498db" filter="url(#ds2)"/>
  <text x="690" y="215" font-size="11" fill="#2471a3" font-weight="bold">MatMul 4096</text>

  <!-- Zone labels -->
  <rect x="150" y="455" width="180" height="30" rx="6" fill="#fdedec" stroke="#e74c3c" stroke-width="1"/>
  <text x="240" y="475" text-anchor="middle" font-size="12" fill="#e74c3c" font-weight="bold">Memory-Bound 영역</text>

  <rect x="470" y="455" width="180" height="30" rx="6" fill="#ebf5fb" stroke="#3498db" stroke-width="1"/>
  <text x="560" y="475" text-anchor="middle" font-size="12" fill="#3498db" font-weight="bold">Compute-Bound 영역</text>
</svg>
