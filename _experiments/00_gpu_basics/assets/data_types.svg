<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'Noto Sans CJK KR', 'Noto Sans', sans-serif">
  <defs>
    <filter id="ds">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">GPU 데이터 타입 비교</text>

  <!-- FP32 -->
  <g transform="translate(50, 55)">
    <rect width="700" height="85" rx="10" fill="#ebf5fb" stroke="#3498db" stroke-width="1.5" filter="url(#ds)"/>
    <text x="15" y="25" font-size="15" font-weight="bold" fill="#2471a3">FP32 (32비트)</text>
    <text x="680" y="25" text-anchor="end" font-size="12" fill="#5dade2">4 바이트 | 소수점 7자리</text>
    <!-- Bit layout -->
    <rect x="15" y="38" width="40" height="32" rx="4" fill="#e74c3c"/><text x="35" y="59" text-anchor="middle" font-size="10" fill="white" font-weight="bold">부호</text>
    <rect x="60" y="38" width="180" height="32" rx="4" fill="#3498db"/><text x="150" y="59" text-anchor="middle" font-size="11" fill="white" font-weight="bold">지수 8비트</text>
    <rect x="245" y="38" width="440" height="32" rx="4" fill="#2ecc71"/><text x="465" y="59" text-anchor="middle" font-size="11" fill="white" font-weight="bold">가수 23비트</text>
    <text x="15" y="82" font-size="11" fill="#7f8c8d">범위: 넓음 | 정밀도: 높음 | 기본 float 타입</text>
  </g>

  <!-- FP16 -->
  <g transform="translate(50, 155)">
    <rect width="700" height="85" rx="10" fill="#fef9e7" stroke="#f39c12" stroke-width="1.5" filter="url(#ds)"/>
    <text x="15" y="25" font-size="15" font-weight="bold" fill="#9a7d0a">FP16 (16비트)</text>
    <text x="680" y="25" text-anchor="end" font-size="12" fill="#d4ac0d">2 바이트 | 소수점 3자리</text>
    <rect x="15" y="38" width="40" height="32" rx="4" fill="#e74c3c"/><text x="35" y="59" text-anchor="middle" font-size="10" fill="white" font-weight="bold">부호</text>
    <rect x="60" y="38" width="100" height="32" rx="4" fill="#f39c12"/><text x="110" y="59" text-anchor="middle" font-size="11" fill="white" font-weight="bold">지수 5비트</text>
    <rect x="165" y="38" width="180" height="32" rx="4" fill="#2ecc71"/><text x="255" y="59" text-anchor="middle" font-size="11" fill="white" font-weight="bold">가수 10비트</text>
    <rect x="360" y="38" width="325" height="32" rx="4" fill="#f0f0f0" stroke="#ddd" stroke-dasharray="4"/>
    <text x="522" y="59" text-anchor="middle" font-size="11" fill="#bbb">← FP32 대비 절반 크기</text>
    <text x="15" y="82" font-size="11" fill="#7f8c8d">범위: 좁음 (오버플로우 위험) | 추론에 많이 사용</text>
  </g>

  <!-- BF16 -->
  <g transform="translate(50, 255)">
    <rect width="700" height="85" rx="10" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5" filter="url(#ds)"/>
    <text x="15" y="25" font-size="15" font-weight="bold" fill="#1e8449">BF16 (Brain Float 16)</text>
    <text x="680" y="25" text-anchor="end" font-size="12" fill="#27ae60">2 바이트 | 소수점 2자리</text>
    <rect x="15" y="38" width="40" height="32" rx="4" fill="#e74c3c"/><text x="35" y="59" text-anchor="middle" font-size="10" fill="white" font-weight="bold">부호</text>
    <rect x="60" y="38" width="180" height="32" rx="4" fill="#3498db"/><text x="150" y="59" text-anchor="middle" font-size="11" fill="white" font-weight="bold">지수 8비트 (FP32와 동일!)</text>
    <rect x="245" y="38" width="100" height="32" rx="4" fill="#2ecc71"/><text x="295" y="59" text-anchor="middle" font-size="11" fill="white" font-weight="bold">가수 7비트</text>
    <rect x="360" y="38" width="325" height="32" rx="4" fill="#f0f0f0" stroke="#ddd" stroke-dasharray="4"/>
    <text x="522" y="59" text-anchor="middle" font-size="11" fill="#bbb">← FP32 대비 절반 크기</text>
    <text x="15" y="82" font-size="11" fill="#7f8c8d">범위: FP32와 동일! | 오버플로우 걱정 없음 → 학습에 가장 유리</text>
  </g>

  <!-- INT8 -->
  <g transform="translate(50, 355)">
    <rect width="700" height="85" rx="10" fill="#f4ecf7" stroke="#8e44ad" stroke-width="1.5" filter="url(#ds)"/>
    <text x="15" y="25" font-size="15" font-weight="bold" fill="#6c3483">INT8 (8비트 정수)</text>
    <text x="680" y="25" text-anchor="end" font-size="12" fill="#8e44ad">1 바이트 | -128 ~ 127</text>
    <rect x="15" y="38" width="170" height="32" rx="4" fill="#8e44ad"/><text x="100" y="59" text-anchor="middle" font-size="11" fill="white" font-weight="bold">8비트 정수</text>
    <rect x="190" y="38" width="495" height="32" rx="4" fill="#f0f0f0" stroke="#ddd" stroke-dasharray="4"/>
    <text x="438" y="59" text-anchor="middle" font-size="11" fill="#bbb">← FP32 대비 1/4 크기</text>
    <text x="15" y="82" font-size="11" fill="#7f8c8d">소수점 없음 | 양자화(Quantization)된 추론 전용</text>
  </g>

  <!-- Model memory comparison -->
  <g transform="translate(50, 455)">
    <rect width="700" height="50" rx="8" fill="#fdf2e9" stroke="#e67e22" stroke-width="1.5"/>
    <text x="15" y="22" font-size="13" font-weight="bold" fill="#a04000">Llama 3 8B 메모리:</text>
    <rect x="200" y="10" width="200" height="12" rx="3" fill="#3498db" opacity="0.8"/>
    <text x="200" y="38" font-size="11" fill="#555">FP32: 32GB</text>
    <rect x="200" y="26" width="100" height="12" rx="3" fill="#f39c12" opacity="0.8"/>
    <rect x="410" y="10" width="100" height="12" rx="3" fill="#27ae60" opacity="0.8"/>
    <text x="410" y="38" font-size="11" fill="#555">FP16: 16GB</text>
    <rect x="520" y="10" width="50" height="12" rx="3" fill="#8e44ad" opacity="0.8"/>
    <text x="520" y="38" font-size="11" fill="#555">INT8: 8GB</text>
    <text x="620" y="38" font-size="11" fill="#555">INT4: 4GB</text>
    <rect x="620" y="10" width="25" height="12" rx="3" fill="#e74c3c" opacity="0.8"/>
  </g>
</svg>
