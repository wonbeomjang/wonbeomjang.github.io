<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Noto Sans CJK KR', 'Noto Sans', sans-serif">
  <defs>
    <filter id="ds3">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
  </defs>

  <text x="400" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">Latency Hiding (지연 숨기기)</text>

  <!-- BAD: Single Warp -->
  <rect x="30" y="45" width="740" height="140" rx="12" fill="#fdedec" stroke="#e74c3c" stroke-width="1.5" filter="url(#ds3)"/>
  <text x="50" y="72" font-size="14" font-weight="bold" fill="#c0392b">Warp가 1개만 있을 때 (낮은 Occupancy)</text>

  <!-- Timeline -->
  <line x1="60" y1="105" x2="740" y2="105" stroke="#ddd" stroke-width="1"/>
  <text x="55" y="110" text-anchor="end" font-size="11" fill="#555">Warp 0</text>

  <!-- Warp 0 blocks -->
  <rect x="70" y="90" width="80" height="30" rx="4" fill="#3498db"/>
  <text x="110" y="110" text-anchor="middle" font-size="10" fill="white" font-weight="bold">계산</text>

  <rect x="150" y="90" width="200" height="30" rx="4" fill="#e74c3c" opacity="0.3" stroke="#e74c3c" stroke-dasharray="3"/>
  <text x="250" y="110" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="bold">메모리 대기 (SM 놀고 있음!)</text>

  <rect x="350" y="90" width="80" height="30" rx="4" fill="#3498db"/>
  <text x="390" y="110" text-anchor="middle" font-size="10" fill="white" font-weight="bold">계산</text>

  <rect x="430" y="90" width="200" height="30" rx="4" fill="#e74c3c" opacity="0.3" stroke="#e74c3c" stroke-dasharray="3"/>
  <text x="530" y="110" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="bold">메모리 대기 (SM 놀고 있음!)</text>

  <rect x="630" y="90" width="80" height="30" rx="4" fill="#3498db"/>
  <text x="670" y="110" text-anchor="middle" font-size="10" fill="white" font-weight="bold">계산</text>

  <!-- Utilization bar -->
  <text x="55" y="165" text-anchor="end" font-size="11" fill="#c0392b" font-weight="bold">활용률</text>
  <rect x="70" y="150" width="650" height="18" rx="4" fill="#fadbd8"/>
  <rect x="70" y="150" width="217" height="18" rx="4" fill="#e74c3c" opacity="0.7"/>
  <text x="395" y="163" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="bold">~33% (낭비 많음)</text>

  <!-- GOOD: Multiple Warps -->
  <rect x="30" y="200" width="740" height="190" rx="12" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5" filter="url(#ds3)"/>
  <text x="50" y="227" font-size="14" font-weight="bold" fill="#1e8449">Warp가 여러 개 있을 때 (높은 Occupancy)</text>

  <!-- Warp 0 -->
  <line x1="60" y1="258" x2="740" y2="258" stroke="#d5f5e3" stroke-width="1"/>
  <text x="55" y="263" text-anchor="end" font-size="11" fill="#555">Warp 0</text>
  <rect x="70" y="243" width="80" height="28" rx="4" fill="#3498db"/>
  <text x="110" y="262" text-anchor="middle" font-size="10" fill="white" font-weight="bold">계산</text>
  <rect x="150" y="243" width="120" height="28" rx="4" fill="#bbb" opacity="0.2"/>
  <rect x="270" y="243" width="80" height="28" rx="4" fill="#3498db"/>
  <text x="310" y="262" text-anchor="middle" font-size="10" fill="white" font-weight="bold">계산</text>
  <rect x="350" y="243" width="120" height="28" rx="4" fill="#bbb" opacity="0.2"/>
  <rect x="470" y="243" width="80" height="28" rx="4" fill="#3498db"/>
  <text x="510" y="262" text-anchor="middle" font-size="10" fill="white" font-weight="bold">계산</text>
  <rect x="550" y="243" width="120" height="28" rx="4" fill="#bbb" opacity="0.2"/>
  <rect x="670" y="243" width="80" height="28" rx="4" fill="#3498db"/>

  <!-- Warp 1 -->
  <line x1="60" y1="293" x2="740" y2="293" stroke="#d5f5e3" stroke-width="1"/>
  <text x="55" y="298" text-anchor="end" font-size="11" fill="#555">Warp 1</text>
  <rect x="150" y="278" width="80" height="28" rx="4" fill="#2ecc71"/>
  <text x="190" y="297" text-anchor="middle" font-size="10" fill="white" font-weight="bold">계산</text>
  <rect x="230" y="278" width="40" height="28" rx="4" fill="#bbb" opacity="0.2"/>
  <rect x="350" y="278" width="80" height="28" rx="4" fill="#2ecc71"/>
  <text x="390" y="297" text-anchor="middle" font-size="10" fill="white" font-weight="bold">계산</text>
  <rect x="430" y="278" width="40" height="28" rx="4" fill="#bbb" opacity="0.2"/>
  <rect x="550" y="278" width="80" height="28" rx="4" fill="#2ecc71"/>
  <text x="590" y="297" text-anchor="middle" font-size="10" fill="white" font-weight="bold">계산</text>

  <!-- Warp 2 -->
  <line x1="60" y1="328" x2="740" y2="328" stroke="#d5f5e3" stroke-width="1"/>
  <text x="55" y="333" text-anchor="end" font-size="11" fill="#555">Warp 2</text>
  <rect x="230" y="313" width="80" height="28" rx="4" fill="#f39c12"/>
  <text x="270" y="332" text-anchor="middle" font-size="10" fill="white" font-weight="bold">계산</text>
  <rect x="310" y="313" width="40" height="28" rx="4" fill="#bbb" opacity="0.2"/>
  <rect x="430" y="313" width="80" height="28" rx="4" fill="#f39c12"/>
  <text x="470" y="332" text-anchor="middle" font-size="10" fill="white" font-weight="bold">계산</text>
  <rect x="510" y="313" width="40" height="28" rx="4" fill="#bbb" opacity="0.2"/>
  <rect x="630" y="313" width="80" height="28" rx="4" fill="#f39c12"/>
  <text x="670" y="332" text-anchor="middle" font-size="10" fill="white" font-weight="bold">계산</text>

  <!-- Utilization bar -->
  <text x="55" y="368" text-anchor="end" font-size="11" fill="#1e8449" font-weight="bold">활용률</text>
  <rect x="70" y="353" width="650" height="18" rx="4" fill="#d5f5e3"/>
  <rect x="70" y="353" width="605" height="18" rx="4" fill="#27ae60" opacity="0.7"/>
  <text x="395" y="366" text-anchor="middle" font-size="10" fill="white" font-weight="bold">~93% (SM이 쉴 틈 없이 일함!)</text>
</svg>
