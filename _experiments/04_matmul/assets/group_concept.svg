<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" font-family="'Noto Sans CJK KR', 'Noto Sans', sans-serif">
  <defs>
    <filter id="sh"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/></filter>
  </defs>

  <text x="450" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#2c3e50">Group과 GROUP_SIZE_M 이해하기</text>

  <!-- What is needed for each C tile -->
  <text x="450" y="65" text-anchor="middle" font-size="14" fill="#7f8c8d">C 타일 하나를 계산하려면 A의 행 블록 + B의 열 블록이 필요</text>

  <!-- C(0,0) needs A row0 + B col0 -->
  <g transform="translate(50, 85)">
    <rect x="0" y="0" width="70" height="40" rx="6" fill="#27ae60" opacity="0.9" filter="url(#sh)"/>
    <text x="35" y="25" text-anchor="middle" font-size="12" fill="white" font-weight="bold">C(0,0)</text>
    <text x="80" y="25" font-size="14" fill="#555">=</text>
    <rect x="100" y="0" width="70" height="40" rx="6" fill="#3498db" opacity="0.8" filter="url(#sh)"/>
    <text x="135" y="25" text-anchor="middle" font-size="11" fill="white" font-weight="bold">A 행0</text>
    <text x="180" y="25" font-size="14" fill="#555">+</text>
    <rect x="195" y="0" width="70" height="40" rx="6" fill="#e67e22" opacity="0.8" filter="url(#sh)"/>
    <text x="230" y="25" text-anchor="middle" font-size="11" fill="white" font-weight="bold">B 열0</text>
  </g>

  <g transform="translate(400, 85)">
    <rect x="0" y="0" width="70" height="40" rx="6" fill="#27ae60" opacity="0.7" filter="url(#sh)"/>
    <text x="35" y="25" text-anchor="middle" font-size="12" fill="white" font-weight="bold">C(1,0)</text>
    <text x="80" y="25" font-size="14" fill="#555">=</text>
    <rect x="100" y="0" width="70" height="40" rx="6" fill="#3498db" opacity="0.6" filter="url(#sh)"/>
    <text x="135" y="25" text-anchor="middle" font-size="11" fill="white" font-weight="bold">A 행1</text>
    <text x="180" y="25" font-size="14" fill="#555">+</text>
    <rect x="195" y="0" width="70" height="40" rx="6" fill="#e67e22" opacity="0.8" filter="url(#sh)"/>
    <text x="230" y="25" text-anchor="middle" font-size="11" fill="white" font-weight="bold">B 열0</text>
    <text x="280" y="25" font-size="12" fill="#e74c3c" font-weight="bold">같은 B!</text>
  </g>

  <!-- Divider -->
  <line x1="30" y1="145" x2="870" y2="145" stroke="#eee" stroke-width="1"/>

  <!-- GROUP_SIZE_M = 2 -->
  <text x="250" y="175" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">GROUP_SIZE_M = 2 (M행을 2개씩 묶음)</text>

  <!-- C matrix with groups -->
  <g transform="translate(50, 195)">
    <text x="35" y="-5" text-anchor="middle" font-size="10" fill="#888">N=0</text>
    <text x="100" y="-5" text-anchor="middle" font-size="10" fill="#888">N=1</text>
    <text x="165" y="-5" text-anchor="middle" font-size="10" fill="#888">N=2</text>

    <!-- Group 0 -->
    <rect x="0" y="0" width="200" height="105" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
    <text x="-10" y="30" text-anchor="end" font-size="10" fill="#888">M=0</text>
    <text x="-10" y="80" text-anchor="end" font-size="10" fill="#888">M=1</text>
    <rect x="10" y="10" width="50" height="40" rx="4" fill="#27ae60" opacity="0.9"/><text x="35" y="35" text-anchor="middle" font-size="11" fill="white" font-weight="bold">C(0,0)</text>
    <rect x="75" y="10" width="50" height="40" rx="4" fill="#27ae60" opacity="0.7"/><text x="100" y="35" text-anchor="middle" font-size="11" fill="white" font-weight="bold">C(0,1)</text>
    <rect x="140" y="10" width="50" height="40" rx="4" fill="#27ae60" opacity="0.5"/><text x="165" y="35" text-anchor="middle" font-size="11" fill="white" font-weight="bold">C(0,2)</text>
    <rect x="10" y="55" width="50" height="40" rx="4" fill="#27ae60" opacity="0.8"/><text x="35" y="80" text-anchor="middle" font-size="11" fill="white" font-weight="bold">C(1,0)</text>
    <rect x="75" y="55" width="50" height="40" rx="4" fill="#27ae60" opacity="0.6"/><text x="100" y="80" text-anchor="middle" font-size="11" fill="white" font-weight="bold">C(1,1)</text>
    <rect x="140" y="55" width="50" height="40" rx="4" fill="#27ae60" opacity="0.4"/><text x="165" y="80" text-anchor="middle" font-size="11" fill="white" font-weight="bold">C(1,2)</text>
    <text x="215" y="55" font-size="13" fill="#27ae60" font-weight="bold">Group 0</text>
    <text x="215" y="75" font-size="11" fill="#27ae60">B열 0,1,2를</text>
    <text x="215" y="90" font-size="11" fill="#27ae60">2번씩 재활용</text>

    <!-- Group 1 -->
    <rect x="0" y="115" width="200" height="105" rx="8" fill="#ebf5fb" stroke="#3498db" stroke-width="2"/>
    <text x="-10" y="145" text-anchor="end" font-size="10" fill="#888">M=2</text>
    <text x="-10" y="195" text-anchor="end" font-size="10" fill="#888">M=3</text>
    <rect x="10" y="125" width="50" height="40" rx="4" fill="#3498db" opacity="0.9"/><text x="35" y="150" text-anchor="middle" font-size="11" fill="white" font-weight="bold">C(2,0)</text>
    <rect x="75" y="125" width="50" height="40" rx="4" fill="#3498db" opacity="0.7"/><text x="100" y="150" text-anchor="middle" font-size="11" fill="white" font-weight="bold">C(2,1)</text>
    <rect x="140" y="125" width="50" height="40" rx="4" fill="#3498db" opacity="0.5"/><text x="165" y="150" text-anchor="middle" font-size="11" fill="white" font-weight="bold">C(2,2)</text>
    <rect x="10" y="170" width="50" height="40" rx="4" fill="#3498db" opacity="0.8"/><text x="35" y="195" text-anchor="middle" font-size="11" fill="white" font-weight="bold">C(3,0)</text>
    <rect x="75" y="170" width="50" height="40" rx="4" fill="#3498db" opacity="0.6"/><text x="100" y="195" text-anchor="middle" font-size="11" fill="white" font-weight="bold">C(3,1)</text>
    <rect x="140" y="170" width="50" height="40" rx="4" fill="#3498db" opacity="0.4"/><text x="165" y="195" text-anchor="middle" font-size="11" fill="white" font-weight="bold">C(3,2)</text>
    <text x="215" y="170" font-size="13" fill="#3498db" font-weight="bold">Group 1</text>
    <text x="215" y="190" font-size="11" fill="#3498db">B열 0,1,2를</text>
    <text x="215" y="205" font-size="11" fill="#3498db">2번씩 재활용</text>
  </g>

  <!-- Execution order -->
  <g transform="translate(450, 195)">
    <text x="0" y="15" font-size="14" font-weight="bold" fill="#2c3e50">Group 0 실행 순서</text>

    <rect x="0" y="30" width="400" height="195" rx="8" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1"/>

    <text x="15" y="55" font-size="12" fill="#555">1. C(0,0) = A행0 + B열0</text>
    <text x="15" y="78" font-size="12" fill="#27ae60" font-weight="bold">2. C(1,0) = A행1 + B열0  ← B열0 캐시에 있음!</text>
    <text x="15" y="101" font-size="12" fill="#555">3. C(0,1) = A행0 + B열1</text>
    <text x="15" y="124" font-size="12" fill="#27ae60" font-weight="bold">4. C(1,1) = A행1 + B열1  ← B열1 캐시에 있음!</text>
    <text x="15" y="147" font-size="12" fill="#555">5. C(0,2) = A행0 + B열2</text>
    <text x="15" y="170" font-size="12" fill="#27ae60" font-weight="bold">6. C(1,2) = A행1 + B열2  ← B열2 캐시에 있음!</text>

    <text x="15" y="210" font-size="12" fill="#7f8c8d">→ B 블록을 매번 다시 로드하지 않아도 됨!</text>
  </g>

  <!-- Tradeoff section -->
  <g transform="translate(50, 440)">
    <text x="400" y="0" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">GROUP_SIZE_M 크기별 비교</text>

    <!-- Small -->
    <rect x="0" y="20" width="250" height="100" rx="8" fill="#fef9e7" stroke="#f7dc6f" stroke-width="1.5"/>
    <text x="125" y="45" text-anchor="middle" font-size="13" font-weight="bold" fill="#9a7d0a">GROUP_SIZE_M = 2 (작음)</text>
    <text x="125" y="70" text-anchor="middle" font-size="11" fill="#7d6608">B 블록 2번 재활용</text>
    <text x="125" y="90" text-anchor="middle" font-size="11" fill="#7d6608">A 블록 2개만 캐시에 유지</text>
    <text x="125" y="108" text-anchor="middle" font-size="11" fill="#27ae60" font-weight="bold">A 캐시 안전</text>

    <!-- Medium -->
    <rect x="275" y="20" width="250" height="100" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
    <text x="400" y="45" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e8449">GROUP_SIZE_M = 8 (적당)</text>
    <text x="400" y="70" text-anchor="middle" font-size="11" fill="#1e8449">B 블록 8번 재활용</text>
    <text x="400" y="90" text-anchor="middle" font-size="11" fill="#1e8449">A 블록 8개 캐시에 유지</text>
    <text x="400" y="108" text-anchor="middle" font-size="11" fill="#1e8449" font-weight="bold">보통 최적!</text>

    <!-- Large -->
    <rect x="550" y="20" width="250" height="100" rx="8" fill="#fdedec" stroke="#e74c3c" stroke-width="1.5"/>
    <text x="675" y="45" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">GROUP_SIZE_M = 64 (너무 큼)</text>
    <text x="675" y="70" text-anchor="middle" font-size="11" fill="#922b21">B 블록 64번 재활용</text>
    <text x="675" y="90" text-anchor="middle" font-size="11" fill="#922b21">A 블록 64개... 캐시 초과!</text>
    <text x="675" y="108" text-anchor="middle" font-size="11" fill="#e74c3c" font-weight="bold">A가 캐시에서 밀려남</text>
  </g>

  <!-- Summary -->
  <rect x="50" y="580" width="800" height="80" rx="10" fill="#f0f4f8" stroke="#bdc3c7" stroke-width="1.5"/>
  <text x="450" y="610" text-anchor="middle" font-size="15" font-weight="bold" fill="#2c3e50">한 줄 요약</text>
  <text x="450" y="635" text-anchor="middle" font-size="13" fill="#555">Group = 같은 B 블록을 공유하는 프로그램들의 묶음</text>
  <text x="450" y="652" text-anchor="middle" font-size="13" fill="#555">GROUP_SIZE_M = 한 그룹에 M행을 몇 개 넣을지 (보통 8, autotune이 최적값 탐색)</text>
</svg>
