<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 260" font-family="'Noto Sans CJK KR', 'Noto Sans', sans-serif">
  <defs><filter id="s"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/></filter></defs>

  <text x="375" y="25" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">L2 캐시 최적화: Swizzling</text>

  <!-- Bad order -->
  <rect x="20" y="45" width="340" height="180" rx="10" fill="#fdedec" stroke="#e74c3c" stroke-width="1.5" filter="url(#s)"/>
  <text x="190" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#c0392b">순차 순서 (캐시 비효율)</text>

  <rect x="40" y="85" width="45" height="35" rx="4" fill="#e74c3c"/><text x="62" y="107" text-anchor="middle" font-size="12" fill="white">0</text>
  <rect x="90" y="85" width="45" height="35" rx="4" fill="#e74c3c" opacity="0.85"/><text x="112" y="107" text-anchor="middle" font-size="12" fill="white">1</text>
  <rect x="140" y="85" width="45" height="35" rx="4" fill="#e74c3c" opacity="0.7"/><text x="162" y="107" text-anchor="middle" font-size="12" fill="white">2</text>
  <rect x="190" y="85" width="45" height="35" rx="4" fill="#e74c3c" opacity="0.55"/><text x="212" y="107" text-anchor="middle" font-size="12" fill="white">3</text>
  <rect x="240" y="85" width="45" height="35" rx="4" fill="#e74c3c" opacity="0.4"/><text x="262" y="107" text-anchor="middle" font-size="12" fill="white">4</text>
  <rect x="290" y="85" width="45" height="35" rx="4" fill="#e74c3c" opacity="0.25"/><text x="312" y="107" text-anchor="middle" font-size="12" fill="white">5</text>

  <rect x="40" y="125" width="45" height="35" rx="4" fill="#e74c3c" opacity="0.85"/><text x="62" y="147" text-anchor="middle" font-size="12" fill="white">6</text>
  <rect x="90" y="125" width="45" height="35" rx="4" fill="#e74c3c" opacity="0.7"/><text x="112" y="147" text-anchor="middle" font-size="12" fill="white">7</text>
  <rect x="140" y="125" width="45" height="35" rx="4" fill="#e74c3c" opacity="0.55"/><text x="162" y="147" text-anchor="middle" font-size="12" fill="white">8</text>
  <rect x="190" y="125" width="45" height="35" rx="4" fill="#e74c3c" opacity="0.4"/><text x="212" y="147" text-anchor="middle" font-size="12" fill="white">9</text>
  <rect x="240" y="125" width="45" height="35" rx="4" fill="#e74c3c" opacity="0.25"/><text x="262" y="147" text-anchor="middle" font-size="12" fill="white">10</text>
  <rect x="290" y="125" width="45" height="35" rx="4" fill="#e74c3c" opacity="0.15"/><text x="312" y="147" text-anchor="middle" font-size="12" fill="white">11</text>

  <text x="190" y="195" text-anchor="middle" font-size="11" fill="#c0392b">0→5가 같은 행 → B의 다른 블록 필요</text>
  <text x="190" y="213" text-anchor="middle" font-size="11" fill="#c0392b">L2 캐시에서 쫓겨남</text>

  <!-- Good order -->
  <rect x="390" y="45" width="340" height="180" rx="10" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5" filter="url(#s)"/>
  <text x="560" y="70" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e8449">Swizzled 순서 (캐시 효율)</text>

  <rect x="410" y="85" width="45" height="35" rx="4" fill="#27ae60"/><text x="432" y="107" text-anchor="middle" font-size="12" fill="white">0</text>
  <rect x="460" y="85" width="45" height="35" rx="4" fill="#27ae60" opacity="0.85"/><text x="482" y="107" text-anchor="middle" font-size="12" fill="white">1</text>
  <rect x="510" y="85" width="45" height="35" rx="4" fill="#27ae60" opacity="0.7"/><text x="532" y="107" text-anchor="middle" font-size="12" fill="white">4</text>
  <rect x="560" y="85" width="45" height="35" rx="4" fill="#27ae60" opacity="0.55"/><text x="582" y="107" text-anchor="middle" font-size="12" fill="white">5</text>

  <rect x="410" y="125" width="45" height="35" rx="4" fill="#27ae60" opacity="0.85"/><text x="432" y="147" text-anchor="middle" font-size="12" fill="white">2</text>
  <rect x="460" y="125" width="45" height="35" rx="4" fill="#27ae60" opacity="0.7"/><text x="482" y="147" text-anchor="middle" font-size="12" fill="white">3</text>
  <rect x="510" y="125" width="45" height="35" rx="4" fill="#27ae60" opacity="0.55"/><text x="532" y="147" text-anchor="middle" font-size="12" fill="white">6</text>
  <rect x="560" y="125" width="45" height="35" rx="4" fill="#27ae60" opacity="0.4"/><text x="582" y="147" text-anchor="middle" font-size="12" fill="white">7</text>

  <rect x="410" y="165" width="45" height="30" rx="4" fill="#27ae60" opacity="0.55"/><text x="432" y="184" text-anchor="middle" font-size="12" fill="white">8</text>
  <rect x="460" y="165" width="45" height="30" rx="4" fill="#27ae60" opacity="0.4"/><text x="482" y="184" text-anchor="middle" font-size="12" fill="white">9</text>
  <rect x="510" y="165" width="45" height="30" rx="4" fill="#27ae60" opacity="0.3"/><text x="532" y="184" text-anchor="middle" font-size="12" fill="white">10</text>
  <rect x="560" y="165" width="45" height="30" rx="4" fill="#27ae60" opacity="0.2"/><text x="582" y="184" text-anchor="middle" font-size="12" fill="white">11</text>

  <text x="560" y="213" text-anchor="middle" font-size="11" fill="#1e8449">인접 프로그램이 같은 A/B 블록 공유</text>
  <text x="560" y="231" text-anchor="middle" font-size="11" fill="#1e8449">→ L2 캐시 히트율 향상!</text>
</svg>
