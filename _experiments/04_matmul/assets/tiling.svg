<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" font-family="'Noto Sans CJK KR', 'Noto Sans', sans-serif">
  <defs><filter id="s"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/></filter></defs>

  <text x="400" y="25" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">행렬 곱셈 타일링</text>

  <!-- Matrix A -->
  <text x="120" y="52" text-anchor="middle" font-size="13" fill="#555" font-weight="bold">A (M×K)</text>
  <rect x="40" y="60" width="75" height="75" rx="4" fill="#3498db" opacity="0.8"/><text x="77" y="102" text-anchor="middle" font-size="11" fill="white">A00</text>
  <rect x="120" y="60" width="75" height="75" rx="4" fill="#3498db" opacity="0.5"/><text x="157" y="102" text-anchor="middle" font-size="11" fill="white">A01</text>
  <rect x="40" y="140" width="75" height="75" rx="4" fill="#3498db" opacity="0.5"/><text x="77" y="182" text-anchor="middle" font-size="11" fill="white">A10</text>
  <rect x="120" y="140" width="75" height="75" rx="4" fill="#3498db" opacity="0.3"/><text x="157" y="182" text-anchor="middle" font-size="11" fill="white">A11</text>

  <!-- × -->
  <text x="230" y="145" text-anchor="middle" font-size="24" fill="#555">×</text>

  <!-- Matrix B -->
  <text x="340" y="52" text-anchor="middle" font-size="13" fill="#555" font-weight="bold">B (K×N)</text>
  <rect x="260" y="60" width="75" height="75" rx="4" fill="#e67e22" opacity="0.8"/><text x="297" y="102" text-anchor="middle" font-size="11" fill="white">B00</text>
  <rect x="340" y="60" width="75" height="75" rx="4" fill="#e67e22" opacity="0.5"/><text x="377" y="102" text-anchor="middle" font-size="11" fill="white">B01</text>
  <rect x="260" y="140" width="75" height="75" rx="4" fill="#e67e22" opacity="0.5"/><text x="297" y="182" text-anchor="middle" font-size="11" fill="white">B10</text>
  <rect x="340" y="140" width="75" height="75" rx="4" fill="#e67e22" opacity="0.3"/><text x="377" y="182" text-anchor="middle" font-size="11" fill="white">B11</text>

  <!-- = -->
  <text x="450" y="145" text-anchor="middle" font-size="24" fill="#555">=</text>

  <!-- Matrix C -->
  <text x="570" y="52" text-anchor="middle" font-size="13" fill="#555" font-weight="bold">C (M×N)</text>
  <rect x="480" y="60" width="75" height="75" rx="4" fill="#27ae60" opacity="0.9" stroke="#1e8449" stroke-width="2"/><text x="517" y="102" text-anchor="middle" font-size="11" fill="white" font-weight="bold">C00</text>
  <rect x="560" y="60" width="75" height="75" rx="4" fill="#27ae60" opacity="0.5"/><text x="597" y="102" text-anchor="middle" font-size="11" fill="white">C01</text>
  <rect x="480" y="140" width="75" height="75" rx="4" fill="#27ae60" opacity="0.5"/><text x="517" y="182" text-anchor="middle" font-size="11" fill="white">C10</text>
  <rect x="560" y="140" width="75" height="75" rx="4" fill="#27ae60" opacity="0.3"/><text x="597" y="182" text-anchor="middle" font-size="11" fill="white">C11</text>

  <!-- Formula -->
  <rect x="480" y="230" width="260" height="35" rx="6" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="610" y="253" text-anchor="middle" font-size="13" fill="#1e8449" font-weight="bold">C00 = A00×B00 + A01×B10</text>

  <text x="610" y="275" text-anchor="middle" font-size="11" fill="#7f8c8d">K 차원을 따라 블록 곱을 누적 (tl.dot)</text>
</svg>
