<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 320" font-family="'Noto Sans CJK KR', 'Noto Sans', sans-serif">
  <defs><filter id="s"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/></filter></defs>

  <text x="375" y="25" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">Flash Attention 동작 흐름</text>

  <!-- Q block (fixed) -->
  <rect x="20" y="55" width="120" height="160" rx="10" fill="#3498db" filter="url(#s)"/>
  <text x="80" y="100" text-anchor="middle" font-size="13" fill="white" font-weight="bold">Q block</text>
  <text x="80" y="120" text-anchor="middle" font-size="10" fill="#d6eaf8">BLOCK_M × d</text>
  <text x="80" y="180" text-anchor="middle" font-size="10" fill="#d6eaf8">외부 루프에서</text>
  <text x="80" y="195" text-anchor="middle" font-size="10" fill="#d6eaf8">고정</text>

  <!-- × -->
  <text x="160" y="135" text-anchor="middle" font-size="20" fill="#555">×</text>

  <!-- K blocks (iterate) -->
  <rect x="180" y="55" width="90" height="70" rx="8" fill="#e67e22" filter="url(#s)"/><text x="225" y="88" text-anchor="middle" font-size="11" fill="white" font-weight="bold">K block 0</text><text x="225" y="105" text-anchor="middle" font-size="9" fill="#fdebd0">BLOCK_N × d</text>
  <rect x="180" y="130" width="90" height="70" rx="8" fill="#e67e22" opacity="0.7" filter="url(#s)"/><text x="225" y="163" text-anchor="middle" font-size="11" fill="white" font-weight="bold">K block 1</text>
  <text x="225" y="215" text-anchor="middle" font-size="12" fill="#e67e22">↓ 내부 루프</text>

  <!-- = S -->
  <text x="290" y="135" text-anchor="middle" font-size="16" fill="#555">=</text>

  <!-- S block -->
  <rect x="310" y="70" width="130" height="120" rx="10" fill="#fef9e7" stroke="#f7dc6f" stroke-width="2" filter="url(#s)"/>
  <text x="375" y="98" text-anchor="middle" font-size="12" fill="#9a7d0a" font-weight="bold">S = Q @ K.T</text>
  <text x="375" y="118" text-anchor="middle" font-size="10" fill="#7d6608">BLOCK_M × BLOCK_N</text>

  <text x="375" y="145" text-anchor="middle" font-size="11" fill="#555">↓ Online Softmax</text>
  <text x="375" y="162" text-anchor="middle" font-size="10" fill="#888">m_new = max(m, rowmax(S))</text>
  <text x="375" y="176" text-anchor="middle" font-size="10" fill="#888">P = exp(S - m_new)</text>

  <!-- × V -->
  <text x="460" y="120" text-anchor="middle" font-size="16" fill="#555">×</text>

  <!-- V blocks -->
  <rect x="480" y="55" width="90" height="70" rx="8" fill="#8e44ad" filter="url(#s)"/><text x="525" y="88" text-anchor="middle" font-size="11" fill="white" font-weight="bold">V block 0</text><text x="525" y="105" text-anchor="middle" font-size="9" fill="#e8daef">BLOCK_N × d</text>
  <rect x="480" y="130" width="90" height="70" rx="8" fill="#8e44ad" opacity="0.7" filter="url(#s)"/><text x="525" y="163" text-anchor="middle" font-size="11" fill="white" font-weight="bold">V block 1</text>

  <!-- = O -->
  <text x="590" y="120" text-anchor="middle" font-size="16" fill="#555">→</text>

  <rect x="610" y="70" width="120" height="120" rx="10" fill="#27ae60" filter="url(#s)"/>
  <text x="670" y="110" text-anchor="middle" font-size="13" fill="white" font-weight="bold">O (출력)</text>
  <text x="670" y="130" text-anchor="middle" font-size="10" fill="#d5f5e3">BLOCK_M × d</text>
  <text x="670" y="160" text-anchor="middle" font-size="10" fill="#d5f5e3">점진적 누적</text>
  <text x="670" y="175" text-anchor="middle" font-size="10" fill="#d5f5e3">O += P × V</text>

  <!-- Key insight -->
  <rect x="100" y="250" width="550" height="50" rx="8" fill="#ebf5fb" stroke="#5dade2" stroke-width="1.5"/>
  <text x="375" y="272" text-anchor="middle" font-size="13" fill="#2471a3" font-weight="bold">핵심: N×N 크기의 S 행렬을 전체 만들지 않고 타일별로 처리</text>
  <text x="375" y="290" text-anchor="middle" font-size="12" fill="#5dade2">메모리 O(N²) → O(N)으로 절약!</text>
</svg>
