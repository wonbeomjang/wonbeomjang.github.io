<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="'Noto Sans CJK KR', 'Noto Sans', sans-serif">
  <defs><filter id="s"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/></filter></defs>

  <text x="400" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">커널 퓨전: 나이브 vs Fused</text>

  <!-- Naive -->
  <rect x="20" y="45" width="370" height="320" rx="12" fill="#fdedec" stroke="#e74c3c" stroke-width="1.5" filter="url(#s)"/>
  <text x="205" y="72" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">나이브 (PyTorch) — 4번 왕복</text>

  <rect x="40" y="88" width="140" height="32" rx="6" fill="#e74c3c" opacity="0.8"/><text x="110" y="109" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Global Memory</text>
  <text x="200" y="109" text-anchor="middle" font-size="14" fill="#888">→</text>
  <rect x="220" y="88" width="80" height="32" rx="6" fill="#3498db"/><text x="260" y="109" text-anchor="middle" font-size="11" fill="white">max</text>
  <text x="315" y="109" text-anchor="middle" font-size="14" fill="#888">→</text>
  <rect x="330" y="88" width="45" height="32" rx="6" fill="#e74c3c" opacity="0.8"/><text x="352" y="109" text-anchor="middle" font-size="9" fill="white">저장</text>

  <rect x="40" y="130" width="140" height="32" rx="6" fill="#e74c3c" opacity="0.8"/><text x="110" y="151" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Global Memory</text>
  <text x="200" y="151" text-anchor="middle" font-size="14" fill="#888">→</text>
  <rect x="220" y="130" width="80" height="32" rx="6" fill="#3498db"/><text x="260" y="151" text-anchor="middle" font-size="11" fill="white">exp</text>
  <text x="315" y="151" text-anchor="middle" font-size="14" fill="#888">→</text>
  <rect x="330" y="130" width="45" height="32" rx="6" fill="#e74c3c" opacity="0.8"/><text x="352" y="151" text-anchor="middle" font-size="9" fill="white">저장</text>

  <rect x="40" y="172" width="140" height="32" rx="6" fill="#e74c3c" opacity="0.8"/><text x="110" y="193" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Global Memory</text>
  <text x="200" y="193" text-anchor="middle" font-size="14" fill="#888">→</text>
  <rect x="220" y="172" width="80" height="32" rx="6" fill="#3498db"/><text x="260" y="193" text-anchor="middle" font-size="11" fill="white">sum</text>
  <text x="315" y="193" text-anchor="middle" font-size="14" fill="#888">→</text>
  <rect x="330" y="172" width="45" height="32" rx="6" fill="#e74c3c" opacity="0.8"/><text x="352" y="193" text-anchor="middle" font-size="9" fill="white">저장</text>

  <rect x="40" y="214" width="140" height="32" rx="6" fill="#e74c3c" opacity="0.8"/><text x="110" y="235" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Global Memory</text>
  <text x="200" y="235" text-anchor="middle" font-size="14" fill="#888">→</text>
  <rect x="220" y="214" width="80" height="32" rx="6" fill="#3498db"/><text x="260" y="235" text-anchor="middle" font-size="11" fill="white">나누기</text>
  <text x="315" y="235" text-anchor="middle" font-size="14" fill="#888">→</text>
  <rect x="330" y="214" width="45" height="32" rx="6" fill="#e74c3c" opacity="0.8"/><text x="352" y="235" text-anchor="middle" font-size="9" fill="white">저장</text>

  <text x="205" y="285" text-anchor="middle" font-size="14" fill="#c0392b" font-weight="bold">느린 메모리 8번 접근 (느림!)</text>

  <!-- Fused -->
  <rect x="410" y="45" width="370" height="320" rx="12" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5" filter="url(#s)"/>
  <text x="595" y="72" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e8449">Fused (Triton) — 1번 왕복</text>

  <rect x="430" y="92" width="140" height="32" rx="6" fill="#e74c3c" opacity="0.8"/><text x="500" y="113" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Global Memory</text>
  <text x="590" y="113" text-anchor="middle" font-size="14" fill="#888">→</text>
  <rect x="610" y="92" width="80" height="32" rx="6" fill="#27ae60"/><text x="650" y="113" text-anchor="middle" font-size="11" fill="white">SRAM</text>

  <!-- SRAM operations -->
  <rect x="500" y="140" width="250" height="110" rx="10" fill="#d5f5e3" stroke="#82e0aa" stroke-width="1"/>
  <text x="625" y="162" text-anchor="middle" font-size="12" fill="#1e8449" font-weight="bold">SRAM 내부에서 전부 처리</text>
  <text x="625" y="185" text-anchor="middle" font-size="12" fill="#555">max → exp → sum → 나누기</text>
  <text x="625" y="208" text-anchor="middle" font-size="11" fill="#27ae60">~19 TB/s (초고속!)</text>
  <text x="625" y="235" text-anchor="middle" font-size="11" fill="#7f8c8d">Global Memory 접근 없이!</text>

  <rect x="610" y="260" width="80" height="32" rx="6" fill="#27ae60"/><text x="650" y="281" text-anchor="middle" font-size="11" fill="white">SRAM</text>
  <text x="590" y="281" text-anchor="middle" font-size="14" fill="#888">→</text>
  <rect x="430" y="260" width="140" height="32" rx="6" fill="#e74c3c" opacity="0.8"/><text x="500" y="281" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Global Memory</text>

  <text x="595" y="325" text-anchor="middle" font-size="14" fill="#1e8449" font-weight="bold">느린 메모리 2번만 접근 (빠름!)</text>
</svg>
