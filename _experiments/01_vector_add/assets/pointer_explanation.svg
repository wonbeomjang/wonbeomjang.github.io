<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 260" font-family="'Noto Sans CJK KR', 'Noto Sans', sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/></filter>
  </defs>

  <text x="375" y="25" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">포인터(Pointer) 이해하기</text>
  <text x="375" y="48" text-anchor="middle" font-size="13" fill="#7f8c8d">메모리 = 긴 배열. 포인터 = 시작 주소</text>

  <!-- Memory addresses -->
  <text x="30" y="82" font-size="12" font-weight="bold" fill="#555">주소</text>
  <rect x="80" y="68" width="70" height="30" rx="4" fill="#ecf0f1" stroke="#bdc3c7"/><text x="115" y="88" text-anchor="middle" font-size="11" fill="#555">[0]</text>
  <rect x="155" y="68" width="70" height="30" rx="4" fill="#ecf0f1" stroke="#bdc3c7"/><text x="190" y="88" text-anchor="middle" font-size="11" fill="#555">[1]</text>
  <rect x="230" y="68" width="70" height="30" rx="4" fill="#ecf0f1" stroke="#bdc3c7"/><text x="265" y="88" text-anchor="middle" font-size="11" fill="#555">[2]</text>
  <rect x="305" y="68" width="70" height="30" rx="4" fill="#ecf0f1" stroke="#bdc3c7"/><text x="340" y="88" text-anchor="middle" font-size="11" fill="#555">[3]</text>
  <rect x="380" y="68" width="70" height="30" rx="4" fill="#ecf0f1" stroke="#bdc3c7"/><text x="415" y="88" text-anchor="middle" font-size="11" fill="#555">[4]</text>
  <rect x="455" y="68" width="70" height="30" rx="4" fill="#ecf0f1" stroke="#bdc3c7"/><text x="490" y="88" text-anchor="middle" font-size="11" fill="#555">[5]</text>
  <rect x="530" y="68" width="70" height="30" rx="4" fill="#ecf0f1" stroke="#bdc3c7"/><text x="565" y="88" text-anchor="middle" font-size="11" fill="#555">[6]</text>
  <rect x="605" y="68" width="70" height="30" rx="4" fill="#ecf0f1" stroke="#bdc3c7"/><text x="640" y="88" text-anchor="middle" font-size="11" fill="#555">[7]</text>

  <!-- Values -->
  <text x="30" y="120" font-size="12" font-weight="bold" fill="#555">값</text>
  <rect x="80" y="103" width="70" height="30" rx="4" fill="#3498db"/><text x="115" y="123" text-anchor="middle" font-size="12" fill="white" font-weight="bold">1.0</text>
  <rect x="155" y="103" width="70" height="30" rx="4" fill="#3498db"/><text x="190" y="123" text-anchor="middle" font-size="12" fill="white" font-weight="bold">2.0</text>
  <rect x="230" y="103" width="70" height="30" rx="4" fill="#3498db"/><text x="265" y="123" text-anchor="middle" font-size="12" fill="white" font-weight="bold">3.0</text>
  <rect x="305" y="103" width="70" height="30" rx="4" fill="#3498db"/><text x="340" y="123" text-anchor="middle" font-size="12" fill="white" font-weight="bold">4.0</text>
  <rect x="380" y="103" width="70" height="30" rx="4" fill="#e67e22"/><text x="415" y="123" text-anchor="middle" font-size="12" fill="white" font-weight="bold">5.0</text>
  <rect x="455" y="103" width="70" height="30" rx="4" fill="#e67e22"/><text x="490" y="123" text-anchor="middle" font-size="12" fill="white" font-weight="bold">6.0</text>
  <rect x="530" y="103" width="70" height="30" rx="4" fill="#e67e22"/><text x="565" y="123" text-anchor="middle" font-size="12" fill="white" font-weight="bold">7.0</text>
  <rect x="605" y="103" width="70" height="30" rx="4" fill="#e67e22"/><text x="640" y="123" text-anchor="middle" font-size="12" fill="white" font-weight="bold">8.0</text>

  <!-- x_ptr bracket -->
  <rect x="80" y="138" width="295" height="4" rx="2" fill="#3498db"/>
  <line x1="227" y1="142" x2="227" y2="155" stroke="#3498db" stroke-width="2"/>
  <text x="227" y="170" text-anchor="middle" font-size="13" fill="#2471a3" font-weight="bold">x_ptr = 0</text>
  <text x="227" y="186" text-anchor="middle" font-size="11" fill="#5dade2">"x 데이터는 주소 0부터"</text>

  <!-- y_ptr bracket -->
  <rect x="380" y="138" width="295" height="4" rx="2" fill="#e67e22"/>
  <line x1="527" y1="142" x2="527" y2="155" stroke="#e67e22" stroke-width="2"/>
  <text x="527" y="170" text-anchor="middle" font-size="13" fill="#d35400" font-weight="bold">y_ptr = 4</text>
  <text x="527" y="186" text-anchor="middle" font-size="11" fill="#e67e22">"y 데이터는 주소 4부터"</text>

  <!-- Examples -->
  <rect x="80" y="200" width="595" height="45" rx="8" fill="#fef9e7" stroke="#f7dc6f" stroke-width="1.5"/>
  <text x="100" y="222" font-size="12" fill="#555">예시:</text>
  <text x="155" y="222" font-size="12" fill="#2471a3" font-weight="bold">x_ptr + 2 = 주소 2 → 값 3.0</text>
  <text x="420" y="222" font-size="12" fill="#d35400" font-weight="bold">y_ptr + 1 = 주소 5 → 값 6.0</text>
  <text x="375" y="240" text-anchor="middle" font-size="11" fill="#7f8c8d">tl.load(x_ptr + offsets) = "x 시작 위치에서 offsets만큼 떨어진 값을 읽어라"</text>
</svg>
