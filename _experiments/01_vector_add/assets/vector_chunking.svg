<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 300" font-family="'Noto Sans CJK KR', 'Noto Sans', sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/></filter>
  </defs>

  <text x="375" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">벡터를 청크로 분할 (N=8, BLOCK_SIZE=4)</text>

  <!-- Full vector -->
  <text x="375" y="58" text-anchor="middle" font-size="13" fill="#7f8c8d">전체 벡터</text>
  <g>
    <rect x="75" y="68" width="75" height="40" rx="4" fill="#3498db"/><text x="112" y="93" text-anchor="middle" font-size="13" fill="white" font-weight="bold">x[0]</text>
    <rect x="150" y="68" width="75" height="40" rx="4" fill="#3498db"/><text x="187" y="93" text-anchor="middle" font-size="13" fill="white" font-weight="bold">x[1]</text>
    <rect x="225" y="68" width="75" height="40" rx="4" fill="#3498db"/><text x="262" y="93" text-anchor="middle" font-size="13" fill="white" font-weight="bold">x[2]</text>
    <rect x="300" y="68" width="75" height="40" rx="4" fill="#3498db"/><text x="337" y="93" text-anchor="middle" font-size="13" fill="white" font-weight="bold">x[3]</text>
    <rect x="375" y="68" width="75" height="40" rx="4" fill="#e67e22"/><text x="412" y="93" text-anchor="middle" font-size="13" fill="white" font-weight="bold">x[4]</text>
    <rect x="450" y="68" width="75" height="40" rx="4" fill="#e67e22"/><text x="487" y="93" text-anchor="middle" font-size="13" fill="white" font-weight="bold">x[5]</text>
    <rect x="525" y="68" width="75" height="40" rx="4" fill="#e67e22"/><text x="562" y="93" text-anchor="middle" font-size="13" fill="white" font-weight="bold">x[6]</text>
    <rect x="600" y="68" width="75" height="40" rx="4" fill="#e67e22"/><text x="637" y="93" text-anchor="middle" font-size="13" fill="white" font-weight="bold">x[7]</text>
  </g>

  <!-- Bracket for Program 0 -->
  <rect x="75" y="115" width="300" height="4" rx="2" fill="#3498db"/>
  <line x1="225" y1="119" x2="225" y2="135" stroke="#3498db" stroke-width="2"/>
  <!-- Bracket for Program 1 -->
  <rect x="375" y="115" width="300" height="4" rx="2" fill="#e67e22"/>
  <line x1="525" y1="119" x2="525" y2="135" stroke="#e67e22" stroke-width="2"/>

  <!-- Program 0 box -->
  <rect x="100" y="140" width="250" height="140" rx="12" fill="#ebf5fb" stroke="#3498db" stroke-width="2" filter="url(#s)"/>
  <text x="225" y="168" text-anchor="middle" font-size="15" font-weight="bold" fill="#2471a3">Program 0 (pid=0)</text>
  <text x="225" y="195" text-anchor="middle" font-size="12" fill="#555">offsets = [0, 1, 2, 3]</text>

  <!-- Operation visualization -->
  <text x="140" y="225" font-size="11" fill="#555">x[0]+y[0]</text>
  <text x="200" y="225" font-size="11" fill="#555">x[1]+y[1]</text>
  <text x="140" y="245" font-size="11" fill="#555">x[2]+y[2]</text>
  <text x="200" y="245" font-size="11" fill="#555">x[3]+y[3]</text>

  <text x="225" y="270" text-anchor="middle" font-size="11" fill="#3498db" font-weight="bold">→ output[0..3]</text>

  <!-- Program 1 box -->
  <rect x="400" y="140" width="250" height="140" rx="12" fill="#fef9e7" stroke="#e67e22" stroke-width="2" filter="url(#s)"/>
  <text x="525" y="168" text-anchor="middle" font-size="15" font-weight="bold" fill="#9a7d0a">Program 1 (pid=1)</text>
  <text x="525" y="195" text-anchor="middle" font-size="12" fill="#555">offsets = [4, 5, 6, 7]</text>

  <text x="440" y="225" font-size="11" fill="#555">x[4]+y[4]</text>
  <text x="500" y="225" font-size="11" fill="#555">x[5]+y[5]</text>
  <text x="440" y="245" font-size="11" fill="#555">x[6]+y[6]</text>
  <text x="500" y="245" font-size="11" fill="#555">x[7]+y[7]</text>

  <text x="525" y="270" text-anchor="middle" font-size="11" fill="#e67e22" font-weight="bold">→ output[4..7]</text>
</svg>
