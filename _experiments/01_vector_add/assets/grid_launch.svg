<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 320" font-family="'Noto Sans CJK KR', 'Noto Sans', sans-serif">
  <defs><filter id="s"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/></filter></defs>

  <text x="375" y="25" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">그리드 설정과 커널 실행</text>

  <!-- Step 1: Calculate grid size -->
  <rect x="20" y="50" width="710" height="80" rx="10" fill="#ebf5fb" stroke="#5dade2" stroke-width="1.5" filter="url(#s)"/>
  <text x="40" y="75" font-size="14" font-weight="bold" fill="#2471a3">1단계: 프로그램 몇 개 필요한지 계산</text>
  <text x="40" y="100" font-size="12" fill="#555">n_elements = 1000, BLOCK_SIZE = 256</text>
  <text x="40" y="118" font-size="12" fill="#555">grid = triton.cdiv(1000, 256) = ceil(1000/256) = </text>
  <text x="410" y="118" font-size="14" fill="#e74c3c" font-weight="bold">4개 프로그램</text>

  <!-- Step 2: Visual -->
  <rect x="20" y="145" width="710" height="85" rx="10" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5" filter="url(#s)"/>
  <text x="40" y="170" font-size="14" font-weight="bold" fill="#1e8449">2단계: GPU가 4개 프로그램을 동시 실행</text>

  <rect x="40" y="182" width="155" height="35" rx="6" fill="#3498db" filter="url(#s)"/>
  <text x="117" y="204" text-anchor="middle" font-size="11" fill="white" font-weight="bold">P0: [0~255]</text>

  <rect x="205" y="182" width="155" height="35" rx="6" fill="#e67e22" filter="url(#s)"/>
  <text x="282" y="204" text-anchor="middle" font-size="11" fill="white" font-weight="bold">P1: [256~511]</text>

  <rect x="370" y="182" width="155" height="35" rx="6" fill="#8e44ad" filter="url(#s)"/>
  <text x="447" y="204" text-anchor="middle" font-size="11" fill="white" font-weight="bold">P2: [512~767]</text>

  <rect x="535" y="182" width="180" height="35" rx="6" fill="#27ae60" filter="url(#s)"/>
  <text x="625" y="204" text-anchor="middle" font-size="11" fill="white" font-weight="bold">P3: [768~999] + mask</text>

  <!-- Step 3: kernel launch syntax -->
  <rect x="20" y="245" width="710" height="60" rx="10" fill="#f4ecf7" stroke="#8e44ad" stroke-width="1.5" filter="url(#s)"/>
  <text x="40" y="270" font-size="14" font-weight="bold" fill="#6c3483">3단계: 커널 실행 코드</text>

  <text x="40" y="293" font-size="13" fill="#555" font-family="'Noto Sans CJK KR', 'Noto Sans', sans-serif">vector_add_kernel</text>
  <text x="220" y="293" font-size="13" fill="#e74c3c" font-weight="bold" font-family="'Noto Sans CJK KR', 'Noto Sans', sans-serif">[grid]</text>
  <text x="267" y="293" font-size="13" fill="#555" font-family="'Noto Sans CJK KR', 'Noto Sans', sans-serif">(x, y, output, n_elements, BLOCK_SIZE=1024)</text>

  <text x="220" y="310" font-size="10" fill="#e74c3c">프로그램 개수</text>
  <text x="400" y="310" font-size="10" fill="#888">커널에 전달할 인자들</text>
</svg>
