<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" font-family="'Noto Sans CJK KR', 'Noto Sans', sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.1"/></filter>
  </defs>

  <text x="350" y="25" text-anchor="middle" font-size="18" font-weight="bold" fill="#2c3e50">마스크(Mask) 동작 원리</text>
  <text x="350" y="48" text-anchor="middle" font-size="13" fill="#7f8c8d">벡터 길이 = 7, BLOCK_SIZE = 4, Program 1 (pid=1)</text>

  <!-- offsets row -->
  <text x="50" y="85" font-size="13" font-weight="bold" fill="#555">offsets</text>
  <rect x="140" y="68" width="100" height="35" rx="6" fill="#3498db"/><text x="190" y="91" text-anchor="middle" font-size="14" fill="white" font-weight="bold">4</text>
  <rect x="250" y="68" width="100" height="35" rx="6" fill="#3498db"/><text x="300" y="91" text-anchor="middle" font-size="14" fill="white" font-weight="bold">5</text>
  <rect x="360" y="68" width="100" height="35" rx="6" fill="#3498db"/><text x="410" y="91" text-anchor="middle" font-size="14" fill="white" font-weight="bold">6</text>
  <rect x="470" y="68" width="100" height="35" rx="6" fill="#e74c3c" opacity="0.4" stroke="#e74c3c" stroke-width="2" stroke-dasharray="4"/><text x="520" y="91" text-anchor="middle" font-size="14" fill="#c0392b" font-weight="bold">7</text>

  <!-- mask row -->
  <text x="50" y="135" font-size="13" font-weight="bold" fill="#555">mask</text>
  <text x="50" y="152" font-size="10" fill="#888">(offsets &lt; 7)</text>
  <rect x="140" y="118" width="100" height="35" rx="6" fill="#27ae60"/><text x="190" y="141" text-anchor="middle" font-size="14" fill="white" font-weight="bold">True</text>
  <rect x="250" y="118" width="100" height="35" rx="6" fill="#27ae60"/><text x="300" y="141" text-anchor="middle" font-size="14" fill="white" font-weight="bold">True</text>
  <rect x="360" y="118" width="100" height="35" rx="6" fill="#27ae60"/><text x="410" y="141" text-anchor="middle" font-size="14" fill="white" font-weight="bold">True</text>
  <rect x="470" y="118" width="100" height="35" rx="6" fill="#e74c3c"/><text x="520" y="141" text-anchor="middle" font-size="14" fill="white" font-weight="bold">False</text>

  <!-- result row -->
  <text x="50" y="185" font-size="13" font-weight="bold" fill="#555">결과</text>
  <text x="190" y="185" text-anchor="middle" font-size="12" fill="#27ae60" font-weight="bold">읽기/쓰기</text>
  <text x="300" y="185" text-anchor="middle" font-size="12" fill="#27ae60" font-weight="bold">읽기/쓰기</text>
  <text x="410" y="185" text-anchor="middle" font-size="12" fill="#27ae60" font-weight="bold">읽기/쓰기</text>
  <text x="520" y="185" text-anchor="middle" font-size="12" fill="#e74c3c" font-weight="bold">건너뜀!</text>

  <!-- annotation -->
  <text x="350" y="212" text-anchor="middle" font-size="12" fill="#7f8c8d">→ 범위를 벗어나는 인덱스는 mask=False로 안전하게 무시</text>
</svg>
